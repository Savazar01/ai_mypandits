<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MyPandits - Enter the Sanctuary</title>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      .temple-arch {
        border-radius: 1.5rem 1.5rem 0.5rem 0.5rem;
      }
      .vedic-gradient-bg {
        background: radial-gradient(circle at center, #faf9f6 0%, #efeeeb 100%);
      }
      .saffron-gold-gradient {
        background: linear-gradient(135deg, #FF9933 0%, #D4AF37 100%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center vedic-gradient-bg overflow-hidden">
<!-- Subtle Background Motifs -->
<div class="absolute inset-0 pointer-events-none overflow-hidden opacity-[0.03] flex items-center justify-center">
<span class="material-symbols-outlined text-[600px] rotate-12" data-icon="filter_vintage">filter_vintage</span>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-6">
<!-- Login Card -->
<div class="glass-card temple-arch p-10 flex flex-col items-center shadow-2xl shadow-primary/5">
<!-- Saffron Lotus Icon -->
<div class="mb-6">
<span class="material-symbols-outlined text-primary-container text-5xl" data-icon="local_florist" style="font-variation-settings: 'FILL' 1;">local_florist</span>
</div>
<!-- Title -->
<h1 class="text-3xl font-light tracking-tight text-on-surface mb-10 text-center">
                Enter the Sanctuary
            </h1>
<!-- Login Form -->
<form class="w-full space-y-8">
<!-- Email Field -->
<div class="relative">
<input class="peer w-full bg-transparent border-0 border-b-2 border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary transition-all duration-300 placeholder-transparent" id="email" name="email" placeholder=" " type="email"/>
<label class="absolute left-0 top-3 text-on-surface-variant/60 font-label text-sm transition-all duration-300 peer-placeholder-shown:text-base peer-placeholder-shown:top-3 peer-focus:-top-4 peer-focus:text-xs peer-focus:text-primary" for="email">
                        Email Address
                    </label>
</div>
<!-- Password Field -->
<div class="relative">
<input class="peer w-full bg-transparent border-0 border-b-2 border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary transition-all duration-300 placeholder-transparent" id="password" name="password" placeholder=" " type="password"/>
<label class="absolute left-0 top-3 text-on-surface-variant/60 font-label text-sm transition-all duration-300 peer-placeholder-shown:text-base peer-placeholder-shown:top-3 peer-focus:-top-4 peer-focus:text-xs peer-focus:text-primary" for="password">
                        Password
                    </label>
</div>
<!-- Action Button -->
<div class="pt-6">
<button class="saffron-gold-gradient w-full py-4 rounded-full text-white font-semibold text-lg tracking-wide hover:shadow-lg hover:shadow-primary/20 active:scale-95 transition-all duration-200" type="submit">
                        Sign In
                    </button>
</div>
</form>
<!-- Secondary Links -->
<div class="mt-10 flex flex-col items-center space-y-4 w-full">
<a class="text-xs font-label uppercase tracking-widest text-outline hover:text-primary transition-colors duration-300" href="#">
                    Forgot Password
                </a>
<div class="w-8 h-[1px] bg-outline-variant/30"></div>
<p class="text-xs font-label text-on-surface-variant/70 uppercase tracking-widest">
                    New to the journey? 
                    <a class="text-primary font-bold ml-1 hover:underline underline-offset-4" href="#">
                        Create an Account
                    </a>
</p>
</div>
</div>
<!-- Decorative Subtle Branding -->
<div class="mt-12 text-center">
<h2 class="font-headline italic text-xl text-primary/40 tracking-widest">MyPandits</h2>
</div>
</main>
<!-- Footer Area (Suppressed Nav, Minimalist Policy) -->
<footer class="fixed bottom-0 w-full flex flex-col md:flex-row justify-between items-center px-12 py-8 w-full opacity-60">
<p class="font-public-sans text-xs uppercase tracking-widest text-orange-800/50 dark:text-orange-400/40">
            © 2024 Sacred Modernity. All rights reserved.
        </p>
<div class="flex space-x-6 mt-4 md:mt-0">
<a class="font-public-sans text-xs uppercase tracking-widest text-orange-800/50 dark:text-orange-400/40 hover:text-orange-900 transition-opacity" href="#">Privacy Policy</a>
<a class="font-public-sans text-xs uppercase tracking-widest text-orange-800/50 dark:text-orange-400/40 hover:text-orange-900 transition-opacity" href="#">Ritual Guidelines</a>
</div>
</footer>
<!-- Decorative Corner Mandala (Visual Accent) -->
<div class="fixed top-0 right-0 p-12 opacity-[0.05] pointer-events-none hidden lg:block">
<img alt="Intricate gold mandala pattern with sacred geometry symmetry and ethereal lighting" class="w-64 h-64 mix-blend-multiply" data-alt="Intricate circular gold mandala pattern with sacred geometry symmetry and soft ethereal glow on cream paper texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCedZrQpM6TppMwEKqXTm86nLB_yh0_X5s8UmwPdi4PYDVsrm8zQqq7b7XXs-DYwHfu8_g9Ph2Amm-uhnHtBO7kTGmOY1iMmYtakIZwNa4mj16YbtK4YcUU7IAByESUoiNpeNUfFv5oqDaelzQkh4_ebH6mMz7fYthuJpHR_Kt5wW_F4mb_RB2Elcks4d0nCymwCdJO_3KnXEU1i1bs20Maz5FCLCg2ru0YU4-fi-GlEDf1qz2zJC-E_BUZrjzNkjft5TFn7KJVjlE"/>
</div>
