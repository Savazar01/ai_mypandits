<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Decorative Elements -->
<div class="absolute inset-0 mandala-bg pointer-events-none" data-alt="close-up detail of a traditional circular stone carved mandala with intricate geometric patterns and sacred symbols in soft light"></div>
<!-- Top Nav Anchor (Manual execution from Shared Components) -->
<header class="fixed top-0 w-full z-50 bg-[#faf9f6]/80 backdrop-blur-xl flex justify-between items-center px-6 py-4 shadow-[0_30px_60px_-15px_rgba(143,78,0,0.08)]">
<div class="text-2xl font-headline font-bold text-orange-900 tracking-tight">Vedic Sanctuary</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-stone-500 hover:text-orange-700 transition-colors duration-300 cursor-pointer">help</span>
<span class="material-symbols-outlined text-stone-500 hover:text-orange-700 transition-colors duration-300 cursor-pointer">settings</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-xl px-6 py-20 relative z-10 flex flex-col items-center">
<!-- Register Card -->
<div class="w-full bg-surface-container-lowest/20 backdrop-blur-[16px] rounded-[2.5rem] p-10 md:p-16 flex flex-col items-center shadow-[0_40px_100px_-20px_rgba(143,78,0,0.06)]">
<!-- Headline -->
<h1 class="font-body font-light text-4xl text-on-surface tracking-tight mb-2 text-center">Join the Sanctuary</h1>
<p class="font-headline italic text-primary/60 text-sm mb-12">Begin your journey toward spiritual alignment</p>
<form class="w-full space-y-10">
<!-- Role Selector (Mandatory) -->
<div class="flex justify-center p-1 bg-surface-container-low rounded-full w-full max-w-xs mx-auto mb-8">
<button class="flex-1 py-2 px-6 rounded-full bg-surface-container-lowest text-on-surface text-sm font-medium shadow-sm transition-all" type="button">
                        Customer
                    </button>
<button class="flex-1 py-2 px-6 rounded-full text-stone-400 text-sm font-medium hover:text-primary transition-all" type="button">
                        Provider
                    </button>
</div>
<!-- Fields -->
<div class="space-y-8">
<div class="relative">
<input class="peer block w-full px-0 py-3 bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface placeholder-transparent" id="full_name" placeholder=" " required="" type="text"/>
<label class="absolute left-0 -top-4 text-xs font-medium text-primary/60 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-3 peer-focus:-top-4 peer-focus:text-xs peer-focus:text-primary uppercase tracking-widest" for="full_name">Full Name</label>
</div>
<div class="relative">
<input class="peer block w-full px-0 py-3 bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface placeholder-transparent" id="email" placeholder=" " required="" type="email"/>
<label class="absolute left-0 -top-4 text-xs font-medium text-primary/60 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-3 peer-focus:-top-4 peer-focus:text-xs peer-focus:text-primary uppercase tracking-widest" for="email">Email Address</label>
</div>
<div class="relative">
<input class="peer block w-full px-0 py-3 bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface placeholder-transparent" id="password" placeholder=" " required="" type="password"/>
<label class="absolute left-0 -top-4 text-xs font-medium text-primary/60 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-3 peer-focus:-top-4 peer-focus:text-xs peer-focus:text-primary uppercase tracking-widest" for="password">Password</label>
</div>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full py-5 rounded-full sacred-gradient-btn text-white font-medium text-lg tracking-wide hover:scale-[1.02] active:scale-95 transition-all duration-300" type="submit">
                        Create Account
                    </button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-10 text-center">
<p class="text-stone-400 text-sm">
                    Already have an account? 
                    <a class="text-primary font-medium hover:underline underline-offset-4 ml-1" href="#">Sign In</a>
</p>
</div>
</div>
<!-- Decorative Footer Anchor -->
<div class="mt-12 flex items-center justify-center opacity-20">
<div class="h-[1px] w-12 bg-primary"></div>
<span class="material-symbols-outlined mx-4 text-primary" style="font-variation-settings: 'FILL' 1;">spa</span>
<div class="h-[1px] w-12 bg-primary"></div>
</div>
</main>
<!-- Bottom Ornament (Visual balance) -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-primary/5 blur-[120px] rounded-full -z-10"></div>
