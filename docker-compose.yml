services:
  # 1. Frontend: Next.js Application
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mypandits-next
    restart: always
    ports:
      - "3090:3090"
    depends_on:
      - ai-backend
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - PYTHON_BACKEND_URL=${PYTHON_BACKEND_URL:-http://ai-backend:8090}
      - WHATSAPP_SERVICE_URL=${WHATSAPP_SERVICE_URL:-http://whatsapp-service:3095}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - BETTER_AUTH_ORIGINS=${BETTER_AUTH_ORIGINS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    networks:
      - coolify


  # 2. AI Backend: Python FastAPI Service
  ai-backend:
    build:
      context: ./agents/backend
      dockerfile: Dockerfile
    container_name: mypandits-ai
    restart: always
    ports:
      - "8090:8090"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REFRESH_MODE=${REFRESH_MODE:-false}
    networks:
      - coolify


networks:
  coolify:
    external: true
