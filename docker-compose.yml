services:
  # 1. Frontend: Next.js Application
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-runner}
    container_name: mypandits-next
    restart: always
    ports:
      - "3090:3090"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - PYTHON_BACKEND_URL=${PYTHON_BACKEND_URL:-http://ai-backend:8090}
      - WHATSAPP_SERVICE_URL=${WHATSAPP_SERVICE_URL:-http://whatsapp-service:3095}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - BETTER_AUTH_ORIGINS=${BETTER_AUTH_ORIGINS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    networks:
      - coolify
      - mypandits-network
    deploy:
      resources:
        limits:
          memory: 1024M

  # 2. AI Backend: Python FastAPI Service
  ai-backend:
    build:
      context: ./agents/backend
      dockerfile: Dockerfile
    container_name: mypandits-ai
    restart: always
    ports:
      - "8090:8090"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REFRESH_MODE=${REFRESH_MODE:-false}
    networks:
      - coolify
      - mypandits-network
    deploy:
      resources:
        limits:
          memory: 512M

  # 3. WhatsApp Service: Standalone Bridge
  whatsapp-service:
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile
    container_name: mypandits-whatsapp
    restart: always
    shm_size: '2gb' # Critical for Puppeteer/Chromium on Linux
    ports:
      - "3095:3095"
    volumes:
      - whatsapp-data:/data/whatsapp_session
    environment:
      - WHATSAPP_SERVICE_URL=${WHATSAPP_SERVICE_URL:-http://whatsapp-service:3095}
    networks:
      - coolify
      - mypandits-network
    deploy:
      resources:
        limits:
          memory: 1024M

networks:
  coolify:
    external: true
  mypandits-network:
    driver: bridge

volumes:
  # Map to existing Coolify volume names
  whatsapp-data:
    name: ${WHATSAPP_VOLUME_NAME:-whatsapp-data}

