
services:
  # 1. Database Layer: Fully aligned with production standards
  db:
    image: postgres:16-alpine
    container_name: mypandits-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=PanditAdmin2026
      - POSTGRES_DB=mypandits
    ports:
      - "5433:5432" # Keep 5433 for external access if needed
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mypandits-network

  # 2. Frontend: Next.js Application
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-runner} # Defaults to production 'runner' stage
    container_name: mypandits-next
    restart: always
    ports:
      - "3090:3090"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://postgres:PanditAdmin2026@db:5432/mypandits?schema=public
      - PYTHON_BACKEND_URL=http://ai-backend:8090
      - WHATSAPP_SERVICE_URL=http://whatsapp-service:3095
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - db
      - ai-backend
    networks:
      - mypandits-network

  # 3. AI Backend: Python FastAPI Service
  ai-backend:
    build:
      context: ./agents/backend
      dockerfile: Dockerfile
    container_name: mypandits-ai
    restart: always
    ports:
      - "8090:8090"
    environment:
      - DATABASE_URL=postgresql://postgres:PanditAdmin2026@db:5432/mypandits?schema=public
      - REFRESH_MODE=${REFRESH_MODE:-false}
    depends_on:
      - db
    networks:
      - mypandits-network

  # 4. WhatsApp Service: Standalone Bridge
  whatsapp-service:
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile
    container_name: mypandits-whatsapp
    restart: always
    ports:
      - "3095:3095"
    volumes:
      - whatsapp_data:/data/whatsapp_session
    networks:
      - mypandits-network

networks:
  mypandits-network:
    driver: bridge

volumes:
  postgres_data:
  whatsapp_data:
