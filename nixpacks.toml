# [phases.setup] - old April 7th.
# nixPkgs = ["nodejs_20", "chromium", "nss", "freetype", "harfbuzz", "ca-certificates", "libglvnd"]

[phases.setup]
nixPkgs = ["nodejs_20", "chromium"] 

aptPkgs = [
  "ca-certificates",
  "libnss3", 
  "libatk1.0-0t64",     # Updated for modern Debian/Ubuntu
  "libatk-bridge2.0-0t64", # Updated for modern Debian/Ubuntu
  "libcups2", 
  "libgbm1", 
  "libasound2t64",      # Fixed the "no installation candidate" error
  "libasound2-data", 
  "libpangocairo-1.0-0", 
  "libxss1", 
  "libgtk-3-0t64",      # Updated for modern Debian/Ubuntu
  "curl", 
  "wget"
]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
# Starts Web Server on 3090 and WhatsApp Bridge on 3095
cmd = "npm run start -- -p 3090 & WHATSAPP_PORT=3095 node whatsapp-bridge.js"
