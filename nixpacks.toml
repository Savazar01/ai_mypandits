[phases.setup]
# This 'nixpkgsArchive' is the secret. It pins Node.js to a version Prisma accepts.
nixpkgsArchive = "51ad838b03a05b1de6f9f2a0fffecee64a9788ee"
nixPkgs = ["nodejs_20", "chromium"] 

aptPkgs = [
  "ca-certificates", "libnss3", "libatk1.0-0t64", "libatk-bridge2.0-0t64", 
  "libcups2", "libgbm1", "libasound2t64", "libasound2-data", 
  "libpangocairo-1.0-0", "libxss1", "libgtk-3-0t64", "curl", "wget"
]

[phases.install]
# We clean the cache and use --force to handle the Next.js 16 peer conflict
cmds = ["npm cache clean --force", "npm install --force"]

[phases.build]
# Standard build commands.
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "npm run start -- -p 3090 & WHATSAPP_PORT=3095 node whatsapp-bridge.js"
