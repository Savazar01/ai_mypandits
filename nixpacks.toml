[phases.setup]
# Core engines
nixPkgs = ["nodejs_20", "chromium"] 

# System libraries for the internal container (Ubuntu-based)
aptPkgs = [
  "ca-certificates",
  "libnss3", 
  "libatk1.0-0t64", 
  "libatk-bridge2.0-0t64", 
  "libcups2", 
  "libgbm1", 
  "libasound2t64", 
  "libasound2-data", 
  "libpangocairo-1.0-0", 
  "libxss1", 
  "libgtk-3-0t64", 
  "curl", 
  "wget"
]

[phases.install]
# --force is the "master key" to bypass the Next.js 16 vs Better-Auth conflict
cmds = ["npm cache clean --force", "npm install --force"]

[phases.build]
# Standard build commands. Once installed, the code is ready to compile.
cmds = ["npx prisma generate", "npm run build"]

[start]
# Launching the web server on 3090 and the WhatsApp bridge on 3095
cmd = "npm run start -- -p 3090 & WHATSAPP_PORT=3095 node whatsapp-bridge.js"
