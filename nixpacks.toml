[phases.setup]
# This specific archive provides Node 22.14.0 and satisfies Prisma's strict check
nixpkgsArchive = "28ace32529a63842e4f8103e4f9b24960cf6c23a"
nixPkgs = ["nodejs_22", "chromium"]

aptPkgs = [
    "ca-certificates", "libnss3", "libatk1.0-0t64", "libatk-bridge2.0-0t64",
    "libcups2", "libgbm1", "libasound2t64", "libasound2-data",
    "libpangocairo-1.0-0", "libxss1", "libgtk-3-0t64", "curl", "wget", "chromium-browser"
]

[phases.install]
# Keeping --force for the Next.js 16 vs Better-Auth conflict
cmds = ["npm cache clean --force", "npm install --force"]

[phases.build]
# --- UPDATED: Database Sync + App Build ---
# 1. Generate the Prisma Client
# 2. Push the schema to PostgreSQL (ensures all tables like 'verification' exist)
# 3. Build the Next.js app
cmds = [
    "npx prisma generate", 
    "npx prisma db push --accept-data-loss", 
    "npm run build"
]

[start]
cmd = "npm run start -- -p 3090"
