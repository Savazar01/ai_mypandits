# [phases.setup] - old April 7th.
# nixPkgs = ["nodejs_20", "chromium", "nss", "freetype", "harfbuzz", "ca-certificates", "libglvnd"]

[phases.setup]
# Use Nix only for the core engines
nixPkgs = ["nodejs_20", "chromium"] 

# Use APT (Debian) for the system libraries needed by Chromium/Puppeteer
aptPkgs = [
  "ca-certificates",
  "libnss3", 
  "libatk1.0-0", 
  "libatk-bridge2.0-0", 
  "libcups2", 
  "libgbm1", 
  "libasound2", 
  "libpangocairo-1.0-0", 
  "libxss1", 
  "libgtk-3-0", 
  "curl", 
  "wget"
]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
# Starts Web Server on 3090 and WhatsApp Bridge on 3095
cmd = "npm run start -- -p 3090 & WHATSAPP_PORT=3095 node whatsapp-bridge.js"
