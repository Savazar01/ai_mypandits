# [phases.setup] - old April 7th.
# nixPkgs = ["nodejs_20", "chromium", "nss", "freetype", "harfbuzz", "ca-certificates", "libglvnd"]

[phases.setup]
# Core engines
nixPkgs = ["nodejs_20", "chromium"] 

# Debian system libraries for Chromium
aptPkgs = [
  "ca-certificates",
  "libnss3", 
  "libatk1.0-0", 
  "libatk-bridge2.0-0", 
  "libcups2", 
  "libgbm1", 
  "libasound2t64",      # The new Debian standard for ALSA
  "libasound2-data",    # Required data files for ALSA
  "libpangocairo-1.0-0", 
  "libxss1", 
  "libgtk-3-0", 
  "curl", 
  "wget"
]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
# Starts Web Server on 3090 and WhatsApp Bridge on 3095
cmd = "npm run start -- -p 3090 & WHATSAPP_PORT=3095 node whatsapp-bridge.js"
